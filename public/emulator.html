<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Pokemon Fire Red</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script type="text/javascript">
        EJS_player = '#game';
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_gameUrl = '/roms/pokemon_fire_red.zip';
        EJS_core = 'gba';
        EJS_startOnLoaded = true;
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
