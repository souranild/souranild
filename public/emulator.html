<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Console Emulator</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script type="text/javascript">
        // Extract game and core parameters dynamically
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game') || '1695 - Pokemon Fire Red (U)(Independent).zip';
        const core = urlParams.get('core') || 'gba';

        EJS_player = '#game';
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_core = core;
        EJS_startOnLoaded = true;
        EJS_fixedSaveInterval = 1000; // Auto-save SRM to IndexedDB every second

        // Detect base path dynamically for GitHub Pages compatibility
        const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '';
        const rawGameUrl = basePath + '/roms/' + encodeURIComponent(game);

        async function initGame() {
            const cacheName = 'gba-rom-cache-v1';
            const cache = await caches.open(cacheName);
            
            // Check if ROM is cached
            let response = await cache.match(rawGameUrl);
            if (!response) {
                const gameDiv = document.getElementById('game');
                gameDiv.innerHTML = '<div style="color: white; font-family: sans-serif; text-align: center; padding: 2rem;">' +
                                    'Downloading game ROM...<br>' +
                                    '<small style="color: #888;">This only happens on the first launch. Subsequent launches are instant!</small></div>';
                
                try {
                    response = await fetch(rawGameUrl);
                    if (!response.ok) throw new Error('Failed to fetch ROM file from server');
                    
                    // Cache the successful response clone
                    await cache.put(rawGameUrl, response.clone());
                } catch (e) {
                    gameDiv.innerHTML = `<div style="color: #ef4444; font-family: sans-serif; text-align: center; padding: 2rem;">Error: ${e.message}</div>`;
                    return;
                }
            }
            
            const romBlob = await response.blob();
            const blobUrl = URL.createObjectURL(romBlob);
            
            // Assign the local Blob URL to EJS
            EJS_gameUrl = blobUrl;
            
            // Load EmulatorJS dynamically
            const loaderScript = document.createElement('script');
            loaderScript.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(loaderScript);
        }

        initGame();
    </script>
    <script>
        // Keyboard mapping for WASD and alternative keys to standard emulator keys
        const keyMap = {
            'w': 'ArrowUp', 'W': 'ArrowUp',
            'a': 'ArrowLeft', 'A': 'ArrowLeft',
            's': 'ArrowDown', 'S': 'ArrowDown',
            'd': 'ArrowRight', 'D': 'ArrowRight',
            'k': 'x', 'K': 'x', // Button A
            'j': 'z', 'J': 'z', // Button B
            'u': 'q', 'U': 'q', // L Button (Assuming Q/E are L/R defaults or fallback)
            'i': 'e', 'I': 'e', // R Button
            ' ': 'Shift' // Select
        };

        function dispatchMappedKey(e, newKeyName) {
            let keyCode;
            switch(newKeyName) {
                case 'ArrowUp': keyCode = 38; break;
                case 'ArrowDown': keyCode = 40; break;
                case 'ArrowLeft': keyCode = 37; break;
                case 'ArrowRight': keyCode = 39; break;
                case 'x': keyCode = 88; break;
                case 'z': keyCode = 90; break;
                case 'q': keyCode = 81; break;
                case 'e': keyCode = 69; break;
                case 'Shift': keyCode = 16; break;
                default: keyCode = newKeyName.toUpperCase().charCodeAt(0);
            }
            
            const newEvent = new KeyboardEvent(e.type, {
                key: newKeyName,
                code: newKeyName,
                keyCode: keyCode,
                which: keyCode,
                bubbles: true,
                cancelable: true,
                composed: true
            });
            newEvent._isMapped = true;
            e.target.dispatchEvent(newEvent);
        }

        const handleKey = (e) => {
            if (e._isMapped) return;
            const mappedKey = keyMap[e.key];
            if (mappedKey) {
                e.stopImmediatePropagation();
                e.preventDefault();
                dispatchMappedKey(e, mappedKey);
            }
        };

        window.addEventListener('keydown', handleKey, true);
        window.addEventListener('keyup', handleKey, true);

        // Volume control listener
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'setVolume') {
                const vol = event.data.value / 100;
                window.EJS_volume = vol; // Sets the default volume if emulator is loading
                
                // If emulator has initialized AudioContext or elements, manually override
                if (typeof EJS_emulator !== 'undefined' && EJS_emulator.setVolume) {
                    try {
                        EJS_emulator.setVolume(vol);
                    } catch (e) {}
                }
                
                // Fallback for HTML5 audio/video tags generated by the emulator core
                document.querySelectorAll('audio, video').forEach(el => {
                    el.volume = vol;
                });
            }
        });
    </script>
    <!-- Loader script dynamically loaded in initGame() above -->
</body>
</html>
